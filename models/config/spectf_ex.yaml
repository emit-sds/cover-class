# Configuration for training SpecTf model

# DataLoader parameters
batch_size: 64

# Model parameters
model:
  dim_output: 5
  num_heads: 16
  dim_proj: 256
  dim_ff: 512
  dropout: 0.05
  agg: "mean"
  use_residual: false
  num_layers: 1

# Training parameters
training:
  learning_rate: 0.0001
  warmup_steps: 10
  steps_per_epoch: 1000
  total_epochs: 1000
  num_workers: 16

# Random seed for reproducibility
random_seed: 42

# Weights & Biases logging
wandb:
  entity: "your_wandb_entity"
  project: "spectf_ex"
